<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDT - Services Médicaux NC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <div class="app" id="app-wrapper">
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-icon"><i class="fa-solid fa-asterisk"></i></div>
                <div class="brand-text">
                    <h1>Services Médicaux</h1>
                    <p>MOBILE DATABASE<br>TERMINAL</p>
                </div>
            </div>
            <nav id="nav"></nav>
            
            <div class="user-profile">
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
                <div class="info">
                    <strong id="logged-user-name">John Doe</strong>
                    <span>Directrice</span>
                </div>
            </div>
        </aside>

        <main class="content">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="duty-btn" id="duty-toggle">
                        <i class="fa-solid fa-power-off"></i> <span id="duty-text">Hors service</span>
                    </button>
                </div>
                <div class="topbar-right">
                    <span id="clock" class="clock"></span>
                    <button id="theme-toggle" class="btn btn-light" style="margin-left: 15px; padding: 6px 12px;" title="Mode Sombre/Clair"><i class="fa-solid fa-moon"></i></button>
                    <button id="btn-logout" class="btn btn-light" style="margin-left: 10px; padding: 6px 12px;"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button>
                </div>
            </header>

            <section id="view" class="view"></section>
        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="modal-title">Confirmation</h3>
            <p id="modal-message">Êtes-vous sûr ?</p>
            <div class="modal-actions">
                <button class="btn btn-light" id="modal-cancel">Annuler</button>
                <button class="btn btn-red" id="modal-confirm">Confirmer</button>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
